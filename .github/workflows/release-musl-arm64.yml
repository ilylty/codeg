name: Release (Linux musl arm64)

on:
  push:
    tags:
      - "v*-musl"
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to build from"
        required: true
        type: string
      draft:
        description: "Create as draft"
        required: false
        default: false
        type: boolean

env:
  RUST_BACKTRACE: short

concurrency:
  group: release-musl-arm64-${{ github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    name: Build Linux musl arm64
    runs-on: ubuntu-22.04
    env:
      TARGET: aarch64-unknown-linux-musl
      ARTIFACT: codeg-server-linux-musl-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.TARGET }}

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Build frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Build server
        working-directory: src-tauri
        run: |
          cross build --release --bin codeg-server --no-default-features --target ${{ env.TARGET }}
          cross build --release --bin codeg-mcp --no-default-features --target ${{ env.TARGET }}

      - name: Package artifacts
        run: |
          mkdir -p dist/${{ env.ARTIFACT }}
          cp src-tauri/target/${{ env.TARGET }}/release/codeg-server dist/${{ env.ARTIFACT }}/
          cp src-tauri/target/${{ env.TARGET }}/release/codeg-mcp dist/${{ env.ARTIFACT }}/
          chmod +x dist/${{ env.ARTIFACT }}/codeg-server dist/${{ env.ARTIFACT }}/codeg-mcp
          cp -r out dist/${{ env.ARTIFACT }}/web
          cd dist && tar czf ${{ env.ARTIFACT }}.tar.gz ${{ env.ARTIFACT }}
          shasum -a 256 ${{ env.ARTIFACT }}.tar.gz > ${{ env.ARTIFACT }}.tar.gz.sha256

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT }}
          path: |
            dist/${{ env.ARTIFACT }}.tar.gz
            dist/${{ env.ARTIFACT }}.tar.gz.sha256
          retention-days: 7

  release:
    name: Publish release
    runs-on: ubuntu-22.04
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create release and upload
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: dist/**/*
          draft: ${{ github.event.inputs.draft || false }}
          generate_release_notes: true
