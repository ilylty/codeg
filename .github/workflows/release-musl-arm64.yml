name: Release (Linux musl arm64)

on:
  push:
    tags:
      - "v*-musl"
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to build from"
        required: true
        type: string

env:
  RUST_BACKTRACE: short

concurrency:
  group: release-musl-arm64-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create-draft-release:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.release.outputs.release_id }}
      release_url: ${{ steps.release.outputs.release_url }}
      release_body: ${{ steps.release.outputs.release_body }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify tag matches app version
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          APP_VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          if [[ "$TAG" != "v$APP_VERSION-musl" ]]; then
            echo "Tag $TAG does not match expected pattern v$APP_VERSION-musl"
            exit 1
          fi

      - id: release
        name: Create or reuse draft release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = "${{ github.event.inputs.tag || github.ref_name }}";
            const { owner, repo } = context.repo;
            const releaseName = `codeg ${tag}`;
            const { data: tagRef } = await github.rest.git.getRef({
              owner,
              repo,
              ref: `tags/${tag}`,
            });

            let commitSha = tagRef.object.sha;
            if (tagRef.object.type === "tag") {
              const { data: annotatedTag } = await github.rest.git.getTag({
                owner,
                repo,
                tag_sha: commitSha,
              });
              if (annotatedTag.object.type !== "commit") {
                core.setFailed(
                  `Tag ${tag} points to ${annotatedTag.object.type}, not a commit.`,
                );
                return;
              }
              commitSha = annotatedTag.object.sha;
            }

            const { data: commit } = await github.rest.repos.getCommit({
              owner,
              repo,
              ref: commitSha,
            });

            const releaseBody =
              commit.commit.message?.trim() || "_No commit message._";
            let release;

            try {
              const existing = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag,
              });

              if (!existing.data.draft) {
                core.setFailed(
                  `Release for tag ${tag} already exists and is not a draft.`,
                );
                return;
              }

              release = existing.data;
              if (
                release.name !== releaseName ||
                (release.body ?? "").trim() !== releaseBody
              ) {
                const updated = await github.rest.repos.updateRelease({
                  owner,
                  repo,
                  release_id: release.id,
                  name: releaseName,
                  body: releaseBody,
                });
                release = updated.data;
              }
              core.info(`Reusing existing draft release #${release.id}`);
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }

              const created = await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tag,
                name: releaseName,
                body: releaseBody,
                draft: true,
                prerelease: false,
              });

              release = created.data;
              core.info(`Created draft release #${release.id}`);
            }

            core.setOutput("release_id", String(release.id));
            core.setOutput("release_url", release.html_url);
            core.setOutput("release_body", releaseBody);

  build-server-musl-arm64:
    needs: create-draft-release
    name: Server Linux musl arm64
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    env:
      TARGET: aarch64-unknown-linux-musl
      ARTIFACT: codeg-server-linux-musl-arm64
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.TARGET }}

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Build frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Build server + codeg-mcp companion (via cross)
        working-directory: src-tauri
        run: |
          cross build --release --bin codeg-server --no-default-features --target ${{ env.TARGET }}
          cross build --release --bin codeg-mcp --no-default-features --target ${{ env.TARGET }}

      - name: Package
        run: |
          mkdir -p dist/${{ env.ARTIFACT }}
          cp src-tauri/target/${{ env.TARGET }}/release/codeg-server dist/${{ env.ARTIFACT }}/
          cp src-tauri/target/${{ env.TARGET }}/release/codeg-mcp dist/${{ env.ARTIFACT }}/
          chmod +x dist/${{ env.ARTIFACT }}/codeg-server dist/${{ env.ARTIFACT }}/codeg-mcp
          cp -r out dist/${{ env.ARTIFACT }}/web
          cd dist && tar czf ${{ env.ARTIFACT }}.tar.gz ${{ env.ARTIFACT }}

      - name: Sign and checksum bundle
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -n "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            pnpm tauri signer sign "dist/${{ env.ARTIFACT }}.tar.gz" || true
          fi
          ( cd dist && shasum -a 256 "${{ env.ARTIFACT }}.tar.gz" > "${{ env.ARTIFACT }}.tar.gz.sha256" )

      - name: Upload to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          FILES="dist/${{ env.ARTIFACT }}.tar.gz dist/${{ env.ARTIFACT }}.tar.gz.sha256"
          if [ -f "dist/${{ env.ARTIFACT }}.tar.gz.sig" ]; then
            FILES="$FILES dist/${{ env.ARTIFACT }}.tar.gz.sig"
          fi
          gh release upload "$TAG" $FILES --clobber

  publish-release:
    needs:
      - create-draft-release
      - build-server-musl-arm64
    if: ${{ needs.build-server-musl-arm64.result == 'success' }}
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Publish draft release
        uses: actions/github-script@v7
        env:
          RELEASE_ID: ${{ needs.create-draft-release.outputs.release_id }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const releaseId = Number(process.env.RELEASE_ID);

            await github.rest.repos.updateRelease({
              owner,
              repo,
              release_id: releaseId,
              draft: false,
            });

            core.info(`Published release #${releaseId}`);
